[alembic]
script_location = alembic

# Alembic can be run with DATABASE_URL set; this is just a placeholder.
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/postgres

[loggers]
keys = root,sqlalchemy,alembic
qualname = %(qualname)s

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = INFO
handlers =
qualname = sqlalchemy.engine
propagate = 0

[logger_alembic]
level = INFO
handlers =
qualname = alembic
propagate = 0

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

